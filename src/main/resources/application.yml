server:
  port: 8080

spring:
  application:
    name: RMaGo
  datasource:
    url: jdbc:postgresql://localhost:5432/rmago
    username: postgres
    password: 0629


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: ${KAKAO_REDIRECT_URI}
            authorization-grant-type: authorization_code
            client-name: Kakao
            scope:
              - profile_nickname
              - account_email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  secret: ${JWT_SECRET}
  expirationMs: ${JWT_EXPIRATION_MS}

tourapi:
  service-key: ${TOUR_API_KEY}

kakao:
  rest-api-key: ${KAKAO_RESTAPI_KEY}

naver:
  map:
   client-id: ${NAVER_MAP_CLIENT_ID}
   secret-key: ${NAVER_MAP_SECRET_KEY}

laas:
  api:
    url: https://laas-api.wanted.co.kr/recommend
    key: ${LAAS_API_KEY}