spring:
  application:
    name: RMaGo
  datasource:
    url: jdbc:postgresql://localhost:5432/rmago
    username: postgres
    password: 1234

  jpa:
    hibernate:
      ddl-auto: update  # 개발 중에는 update, 운영에선 validate or none 권장
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true